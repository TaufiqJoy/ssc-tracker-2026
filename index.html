<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSC Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="timer-card">
            <div class="header">
                <div class="exam-badge">🎓 UPCOMING EXAM</div>
                <h1>SSC Tracker</h1>
                <p class="exam-details">SSC Examination</p>
                <p class="exam-date">📅 21 April 2026 | ⏰ 10:00 AM</p>
            </div>

            <div id="countdown-container" class="countdown">
                <div class="time-box">
                    <div class="time-value" id="days">00</div>
                    <div class="time-label">Days</div>
                </div>
                <div class="time-box">
                    <div class="time-value" id="hours">00</div>
                    <div class="time-label">Hours</div>
                </div>
                <div class="time-box">
                    <div class="time-value" id="minutes">00</div>
                    <div class="time-label">Minutes</div>
                </div>
                <div class="time-box">
                    <div class="time-value" id="seconds">00</div>
                    <div class="time-label">Seconds</div>
                </div>
            </div>

            <div id="completion-message" class="completion-message">
                <div class="emoji">🎓</div>
                <div class="completion-text">Best of Luck for Your SSC Exam!</div>
                <div class="motivational-text">
                    "Success is the sum of small efforts repeated day in and day out. You've got this!"
                </div>
            </div>

            <div id="motivational-section" class="motivational-text">
                Loading...
            </div>

            <div class="footer">
                  
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
